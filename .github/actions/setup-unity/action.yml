name: 'Setup Unity'
description: 'Bootstraps a minimal Unity project structure to enable testing and Library caching for packages.'

inputs:
  unityVersion:
    description: 'The Unity version to use (e.g., 2022.3.62f3)'
    required: true
  scopedRegistryUrl:
    description: 'Optional OpenUPM or other scoped registry URL'
    required: false
    default: ''
  registryScopes:
    description: 'Comma-separated list of scopes for the registry'
    required: false
    default: ''
  projectName:
    description: 'The name of the temporary project folder'
    required: false
    default: 'TestProject'

runs:
  using: "composite"
  steps:
    - name: ⚙️ Bootstrap Project Folders
      shell: bash
      run: |
        mkdir -p ${{ inputs.projectName }}/ProjectSettings
        mkdir -p ${{ inputs.projectName }}/Packages

    - name: 📝 Generate ProjectVersion.txt
      shell: bash
      run: |
        echo "m_EditorVersion: ${{ inputs.unityVersion }}" > ${{ inputs.projectName }}/ProjectSettings/ProjectVersion.txt

    - name: 📦 Generate manifest.json
      shell: bash
      run: |
        # 1. Initialize dependencies with the local package
        # We assume the current repo is the package. We link it via file:../..
        # since TestProject/Packages is two levels deep from the repo root.
        
        # Get package name from package.json
        PACKAGE_NAME=$(cat package.json | grep '"name":' | head -1 | cut -d '"' -f 4)
        echo "Detected Package Name: $PACKAGE_NAME"

        MANIFEST_PATH="${{ inputs.projectName }}/Packages/manifest.json"
        
        # Start building the JSON
        echo '{ "dependencies": { "'$PACKAGE_NAME'": "file:../.." }' > $MANIFEST_PATH

        # 2. Conditionally add Scoped Registries
        if [ -n "${{ inputs.scopedRegistryUrl }}" ] && [ -n "${{ inputs.registryScopes }}" ]; then
          # Convert comma-separated scopes to JSON array string
          # Example: "com.aim4code, com.cysharp" -> ["com.aim4code", "com.cysharp"]
          SCOPES_JSON=$(echo '"${{ inputs.registryScopes }}"' | sed 's/, /", "/g' | sed 's/,/", "/g')
          
          # Append the scopedRegistries block
          sed -i 's/}$//' $MANIFEST_PATH # Remove trailing bracket to append
          cat <<EOF >> $MANIFEST_PATH
        , "scopedRegistries": [
            {
              "name": "package.openupm.com",
              "url": "${{ inputs.scopedRegistryUrl }}",
              "scopes": [$SCOPES_JSON]
            }
          ]
        }
EOF
        else
          # Close the JSON if no registry
          echo "}" >> $MANIFEST_PATH
        fi
        
        echo "Generated manifest.json:"
        cat $MANIFEST_PATH
